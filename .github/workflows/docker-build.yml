name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag override (optional)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(bun -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "commit=$COMMIT_HASH" >> "$GITHUB_OUTPUT"

      - name: Determine image tags
        id: tags
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          COMMIT="${{ steps.commit.outputs.commit }}"
          REPO="${{ env.IMAGE_NAME }}"
          SUFFIX="${{ matrix.suffix }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=${{ env.REGISTRY }}/$REPO:latest-$SUFFIX,${{ env.REGISTRY }}/$REPO:$VERSION-$SUFFIX,${{ env.REGISTRY }}/$REPO:$COMMIT-$SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=polis-${{ matrix.suffix }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          labels: |
            org.opencontainers.image.title=POLIS
            org.opencontainers.image.description=Poster Overlay Layer Integration Service
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.commit }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          provenance: false
          sbom: false

      - name: Build summary
        if: matrix.suffix == 'amd64'
        run: |
          VERSION="${{ steps.tags.outputs.version }}"
          COMMIT="${{ steps.commit.outputs.commit }}"
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"

          echo "## Docker image build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`$REPO\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** $COMMIT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platforms:** linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          if [ "$IS_PR" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "PR build: images were built but not pushed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tags after manifest job: \`latest\`, \`$VERSION\`, \`$COMMIT\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  create-manifests:
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(bun -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Get commit hash
        id: commit
        run: echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine image tags
        id: tags
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-platform manifest
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.tags.outputs.version }}"
          COMMIT="${{ steps.commit.outputs.commit }}"

          docker buildx imagetools create -t "$REPO:latest" \
            "$REPO:latest-amd64" \
            "$REPO:latest-arm64"

          docker buildx imagetools create -t "$REPO:$VERSION" \
            "$REPO:$VERSION-amd64" \
            "$REPO:$VERSION-arm64"

          docker buildx imagetools create -t "$REPO:$COMMIT" \
            "$REPO:$COMMIT-amd64" \
            "$REPO:$COMMIT-arm64"

          echo "Multi-platform manifests published for latest, $VERSION, and $COMMIT"
